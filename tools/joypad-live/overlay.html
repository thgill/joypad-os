<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>joypad-live • viewer overlay</title>
  <style>
    :root {
      --bg:        rgba(13, 17, 23, 0.78);  /* translucent dark for OBS overlay */
      --panel:     rgba(22, 27, 34, 0.92);
      --border:    rgba(255, 255, 255, 0.10);
      --fg:        #e6edf3;
      --muted:     #8b949e;
      --accent:    #58a6ff;
      --press:     #f1c40f;   /* yellow — buttons */
      --effect:    #ff7b72;   /* red    — profile swap chaos */
      --overlay:   #d2a8ff;   /* purple — overlay tweaks */
      --reset:     #3fb950;   /* green  — back to neutral */
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: transparent;            /* OBS browser source needs transparency */
      color: var(--fg);
      font: 12px/1.4 -apple-system, BlinkMacSystemFont, "SF Pro Text",
                     Inter, system-ui, sans-serif;
      width: 100%;
      overflow: hidden;
    }
    /* Compact panel — sizes to content, doesn't dim surrounding video. */
    .frame {
      background: var(--bg);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 12px;
      padding: 8px 10px;
      margin: 6px;
      max-width: 320px;
      display: flex; flex-direction: column; gap: 6px;
    }
    header {
      display: flex; align-items: center; gap: 6px;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--border);
    }
    header .logo {
      width: 18px; height: 15px;
      color: #fff;
      fill: currentColor;
      filter: drop-shadow(0 0 4px rgba(255,255,255,0.35));
      flex-shrink: 0;
    }
    header h1 {
      font-size: 10px; margin: 0;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--accent); font-weight: 700;
    }
    header .subtitle {
      font-size: 9px; color: var(--muted);
      margin-left: auto;
    }
    .active-banner {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 8px;
      background: var(--panel);
      border-left: 2px solid var(--accent);
      border-radius: 5px;
      font-size: 11px; font-weight: 600;
      transition: all 0.3s;
      opacity: 0.45;
    }
    .active-banner.live {
      opacity: 1;
      border-left-color: var(--effect);
      box-shadow: 0 0 12px rgba(255, 123, 114, 0.35);
    }
    .active-banner .label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .active-banner .timer {
      font-variant-numeric: tabular-nums;
      color: var(--muted); font-size: 10px;
    }

    h2 {
      font-size: 8px; margin: 2px 0 0;
      color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.14em;
      font-weight: 700;
    }
    /* Commands as a single compact line, comma-separated. */
    .commands {
      font: 10.5px "SF Mono", Menlo, monospace;
      color: var(--muted);
      line-height: 1.55;
      letter-spacing: -0.02em;
    }
    .commands code {
      color: var(--accent);
      background: rgba(88,166,255,0.10);
      padding: 1px 4px;
      border-radius: 3px;
    }

    .feed {
      max-height: 160px;
      min-height: 50px;
      display: flex; flex-direction: column-reverse;
      gap: 4px;
      overflow: hidden;
      mask-image: linear-gradient(to bottom, transparent 0%, black 16%, black 100%);
    }
    .feed-row {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 7px;
      background: var(--panel);
      border-left: 2px solid var(--muted);
      border-radius: 4px;
      font-size: 10.5px;
      animation: slidein 0.35s cubic-bezier(.2, .8, .2, 1);
    }
    .feed-row.press   { border-left-color: var(--press); }
    .feed-row.effect  { border-left-color: var(--effect); }
    .feed-row.overlay { border-left-color: var(--overlay); }
    .feed-row.reset   { border-left-color: var(--reset); }
    .feed-row .icon { font-size: 14px; }
    .feed-row .user {
      color: var(--accent); font-weight: 600;
    }
    .feed-row .platform {
      color: var(--muted); font-size: 8.5px; font-weight: 500;
      padding: 0 4px;
      border: 1px solid var(--border); border-radius: 3px;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .feed-row .what { color: var(--fg); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .feed-row .when { margin-left: auto; color: var(--muted); font-size: 9px; flex-shrink: 0; }

    .empty-feed {
      color: var(--muted); font-size: 10px; text-align: center; padding: 12px;
      font-style: italic;
    }

    footer {
      display: flex; gap: 6px; align-items: center;
      padding-top: 4px; border-top: 1px solid var(--border);
      font-size: 9px; color: var(--muted);
    }
    .dot {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      background: var(--muted); transition: background 0.3s;
    }
    .dot.live { background: var(--reset); box-shadow: 0 0 5px var(--reset); }
    footer .count { margin-left: auto; }

    @keyframes slidein {
      from { transform: translateX(-8px); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }
    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50%     { transform: scale(1.05); }
    }
    .pulse { animation: pulse 0.3s ease-out; }
  </style>
</head>
<body>
  <div class="frame">

    <header>
      <svg class="logo" viewBox="0 0 397.996 338.084" xmlns="http://www.w3.org/2000/svg" aria-label="joypad" role="img">

        <path d="m 210.48465,2.5678654 c 13.41632,7.6261496 18.76877,21.5245196 13.3393,33.9345496 -5.45383,12.46577 -19.63974,19.00038 -32.70649,15.0659 -13.78192,-4.14982 -21.9725,-18.98614 -18.04123,-32.67973 3.84998,-13.4101896 19.15308,-21.7896196 32.8375,-17.95630961 1.43341,0.40153001 2.82132,0.96552001 4.57092,1.63559001 z"/>
      </svg>
      <h1>chat is in control</h1>
      <span class="subtitle" id="subtitle">connecting…</span>
    </header>

    <div id="active" class="active-banner">
      <span class="label" id="active-label">no active effect — try one below</span>
      <span class="timer" id="active-timer"></span>
    </div>

    <h2>commands</h2>
    <div class="commands">
      <code>!chaos</code> <code>!aswap</code> <code>!swap</code>
      <code>!invertx</code> <code>!inverty</code> <code>!invertall</code>
      <code>!fullchaos</code> <code>!neutral</code>
      <code>!press &lt;btn&gt;</code> <code>!hold &lt;btn&gt;</code>
      <code>!mash &lt;btn&gt;</code> <code>!effects</code>
    </div>

    <h2>live feed</h2>
    <div id="feed" class="feed">
      <div class="empty-feed" id="empty">waiting for chat to do something…</div>
    </div>

    <footer>
      <span class="dot" id="dot"></span>
      <span id="conn-text">disconnected</span>
      <span class="count" id="count">0 events</span>
    </footer>
  </div>

<script>
const $ = (id) => document.getElementById(id);
const feed = $('feed');
const KIND_ICONS  = { press: '🎮', effect: '💥', overlay: '🔄', reset: '🛑' };
const KIND_LABELS = { press: 'pressed', effect: 'triggered', overlay: 'tweaked', reset: 'reset' };

let total = 0;
let active = null;       // { label, kind, expiresAt, kindClass }
let timerInterval = null;

function setConn(ok) {
  $('dot').classList.toggle('live', ok);
  $('conn-text').textContent = ok ? 'live' : 'disconnected';
  $('subtitle').textContent  = ok ? 'use chat — twitch.tv/ffpsx' : 'reconnecting…';
}

function renderActive() {
  const banner = $('active');
  const label = $('active-label');
  const timer = $('active-timer');
  if (!active || (active.expiresAt && Date.now() >= active.expiresAt)) {
    banner.classList.remove('live');
    label.textContent = 'no active effect — try one below';
    timer.textContent = '';
    return;
  }
  banner.classList.add('live');
  label.textContent = active.label;
  if (active.expiresAt) {
    const sec = Math.max(0, Math.ceil((active.expiresAt - Date.now()) / 1000));
    timer.textContent = `↻ ${sec}s`;
  } else {
    timer.textContent = '';
  }
}

function pushEvent(ev) {
  // remove the empty placeholder once events arrive
  const empty = $('empty');
  if (empty) empty.remove();

  total++;
  $('count').textContent = `${total} event${total === 1 ? '' : 's'}`;

  // Update active banner for state-bearing events
  if (ev.kind === 'effect' || ev.kind === 'overlay' || ev.kind === 'press') {
    if (ev.kind === 'press') {
      // press is transient — only show for ~1s in the banner, no countdown
      active = { label: `${ev.user} → ${ev.label}`, expiresAt: Date.now() + 1000, kindClass: ev.kind };
    } else {
      // effects/overlays have a duration on the bot side; we don't know exact
      // expiry but the bot will fire a 'reset' kind when it fires.
      active = { label: `${ev.user} → ${ev.label}`, expiresAt: null, kindClass: ev.kind };
    }
    renderActive();
  } else if (ev.kind === 'reset') {
    active = null;
    renderActive();
  }

  // Render in feed (skip purely-automatic timer resets to keep the feed clean —
  // the banner already shows "no active effect" when those happen)
  if (ev.kind === 'reset' && ev.user === 'system') return;

  const row = document.createElement('div');
  row.className = `feed-row ${ev.kind || ''}`;
  const when = new Date(ev.ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  row.innerHTML = `
    <span class="icon">${KIND_ICONS[ev.kind] || '•'}</span>
    <span class="user">${escapeHtml(ev.user || '?')}</span>
    <span class="platform">${escapeHtml(ev.platform || '?')}</span>
    <span class="what">${KIND_LABELS[ev.kind] || ''} <strong>${escapeHtml(ev.label || '')}</strong></span>
    <span class="when">${when}</span>
  `;
  feed.appendChild(row);
  // cap visible rows
  while (feed.children.length > 12) feed.removeChild(feed.firstChild);
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// Tick the active banner timer every 200ms
setInterval(renderActive, 200);

// ----- SSE connection with auto-reconnect -----
function connect() {
  const es = new EventSource('/events');
  es.onopen    = () => setConn(true);
  es.onerror   = () => { setConn(false); es.close(); setTimeout(connect, 1500); };
  es.onmessage = (m) => {
    try {
      const ev = JSON.parse(m.data);
      pushEvent(ev);
    } catch (e) { /* ignore */ }
  };
}
connect();
</script>
</body>
</html>
