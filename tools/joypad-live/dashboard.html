<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>joypad-live</title>
  <style>
    :root {
      --bg: #0d1117;
      --fg: #c9d1d9;
      --muted: #8b949e;
      --accent: #58a6ff;
      --ok: #3fb950;
      --warn: #d29922;
      --err: #f85149;
      --card: #161b22;
      --border: #30363d;
    }
    * { box-sizing: border-box; }
    body {
      background: var(--bg); color: var(--fg);
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
      margin: 0; padding: 1.5rem;
      max-width: 820px; margin-left: auto; margin-right: auto;
    }
    h1 { font-size: 1.5rem; margin: 0 0 1rem; display: flex; align-items: center; gap: .5rem; }
    h2 { font-size: .75rem; margin: 1.25rem 0 .5rem; color: var(--muted);
         text-transform: uppercase; letter-spacing: .12em; font-weight: 600; }
    h2 .meta { text-transform: none; letter-spacing: 0; font-weight: 400; }
    .card { background: var(--card); border: 1px solid var(--border);
            border-radius: 8px; padding: 1rem; }
    .row { display: flex; gap: .5rem; flex-wrap: wrap; align-items: center; }
    .row + .row { margin-top: .75rem; }
    button {
      background: var(--card); color: var(--fg); border: 1px solid var(--border);
      border-radius: 6px; padding: .5rem 1rem; font: inherit; cursor: pointer;
      transition: all .1s;
    }
    button:hover { background: #21262d; border-color: #484f58; }
    button:active { transform: translateY(1px); }
    button.active { background: var(--accent); color: #0d1117; border-color: var(--accent); font-weight: 600; }
    button.danger { color: var(--err); }
    button.fire { background: #2ea043; border-color: #2ea043; color: white; font-weight: 600; }
    button.fire:hover { background: #3fb950; border-color: #3fb950; }
    label.toggle {
      display: inline-flex; align-items: center; gap: .4rem;
      padding: .4rem .75rem; border: 1px solid var(--border); border-radius: 6px;
      cursor: pointer; user-select: none;
    }
    label.toggle:hover { background: #21262d; }
    label.toggle input { margin: 0; accent-color: var(--accent); }
    input[type=number], select {
      background: var(--bg); color: var(--fg);
      border: 1px solid var(--border); border-radius: 6px;
      padding: .4rem .5rem; font: inherit;
    }
    .status {
      padding: .2rem .55rem; border-radius: 12px; font-size: .8rem;
      font-weight: 600;
    }
    .status.ok  { background: rgba(63,185,80,.15); color: var(--ok); }
    .status.err { background: rgba(248,81,73,.15); color: var(--err); }
    pre.log {
      background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
      padding: .6rem .75rem; max-height: 220px; overflow-y: auto;
      margin: 0; font: 12px/1.6 "SF Mono", Menlo, monospace;
    }
    .muted { color: var(--muted); }
    .meta  { font-size: .85rem; color: var(--muted); }
    .grow { flex: 1; }
    @media (max-width: 600px) {
      body { padding: 1rem; }
    }
  </style>
</head>
<body>
  <h1>🎮 joypad-live</h1>

  <div class="card">
    <div class="row">
      <span id="status" class="status">connecting…</span>
      <span id="device" class="meta grow"></span>
    </div>
  </div>

  <h2>Profiles <span class="meta">— SELECT (RAM only, hot path)</span></h2>
  <div class="card">
    <div id="profiles" class="row"><span class="muted">loading…</span></div>
  </div>

  <h2>Overlay <span class="meta">— live tweaks composed on top of any profile</span></h2>
  <div class="card">
    <div class="row">
      <label class="toggle"><input type="checkbox" id="ov-lx"> Invert LX</label>
      <label class="toggle"><input type="checkbox" id="ov-ly"> Invert LY</label>
      <label class="toggle"><input type="checkbox" id="ov-rx"> Invert RX</label>
      <label class="toggle"><input type="checkbox" id="ov-ry"> Invert RY</label>
      <label class="toggle"><input type="checkbox" id="ov-swap"> Swap sticks</label>
    </div>
    <div class="row">
      <span class="meta">SOCD:</span>
      <select id="ov-socd">
        <option value="0">no change</option>
        <option value="1">neutral</option>
        <option value="2">up-priority</option>
        <option value="3">last-win</option>
      </select>
      <span class="meta">L sens:</span>
      <input type="number" id="ov-ls" min="0" max="200" value="0" style="width:5em">
      <span class="meta">R sens:</span>
      <input type="number" id="ov-rs" min="0" max="200" value="0" style="width:5em">
    </div>
    <div class="row">
      <button id="ov-apply">Apply overlay</button>
      <button id="ov-clear" class="danger">Clear overlay</button>
    </div>
  </div>

  <h2>Timed effects <span class="meta">— fire then auto-reset</span></h2>
  <div class="card">
    <div class="row">
      <span class="meta">Effect:</span>
      <select id="te-effect">
        <option value="select:1">Profile #1 (AswapB)</option>
        <option value="select:2">Profile #2 (Chaos)</option>
        <option value="overlay:invert-lx">Overlay: invert LX</option>
        <option value="overlay:invert-rx">Overlay: invert RX</option>
        <option value="overlay:invert-both-x">Overlay: invert both X axes</option>
        <option value="overlay:invert-all">Overlay: invert ALL axes</option>
        <option value="overlay:swap">Overlay: swap sticks</option>
        <option value="overlay:full-chaos">Overlay: swap + invert all</option>
      </select>
      <span class="meta">for:</span>
      <input type="number" id="te-secs" min="1" max="300" value="10" style="width:5em">
      <span class="meta">s</span>
      <button id="te-fire" class="fire">Fire</button>
      <span id="te-countdown" class="meta"></span>
    </div>
  </div>

  <h2>Log</h2>
  <pre id="log" class="log"></pre>

<script>
const $ = (id) => document.getElementById(id);

function log(msg) {
  const t = new Date().toLocaleTimeString();
  $('log').textContent = `[${t}] ${msg}\n` + $('log').textContent;
}

async function api(method, path, body) {
  const opts = { method };
  if (body !== undefined) {
    opts.headers = { 'Content-Type': 'application/json' };
    opts.body = JSON.stringify(body);
  } else if (method === 'POST') {
    opts.body = ''; // satisfy HttpListener Content-Length on macOS
  }
  try {
    const r = await fetch(path, opts);
    return await r.json();
  } catch (e) {
    log(`error ${path}: ${e.message}`);
    return null;
  }
}

async function refresh() {
  const info = await api('GET', '/info');
  const list = await api('GET', '/profiles');

  if (info && !info.error) {
    $('status').textContent = 'connected';
    $('status').className = 'status ok';
    $('device').textContent = `${info.app} ${info.version} · ${info.board} · ${info.commit}`;
  } else {
    $('status').textContent = 'disconnected';
    $('status').className = 'status err';
    $('device').textContent = '';
  }

  if (list && list.ok) {
    const el = $('profiles');
    el.innerHTML = '';
    for (const p of list.profiles) {
      const b = document.createElement('button');
      b.textContent = p.builtin ? p.name : `${p.name} ✦`;
      if (p.index === list.active) b.className = 'active';
      b.onclick = async () => {
        const r = await api('POST', p.index === 0 ? '/neutral' : `/profile/${p.index}`);
        if (r && r.ok) log(`profile → ${r.name} (#${r.index}, RAM)`);
        refresh();
      };
      el.appendChild(b);
    }
  }
}

function overlayFlagsFromUI() {
  return ($('ov-swap').checked ? 1 : 0) |
         ($('ov-ly').checked   ? 2 : 0) |
         ($('ov-ry').checked   ? 4 : 0) |
         ($('ov-lx').checked   ? 8 : 0) |
         ($('ov-rx').checked   ? 16 : 0);
}

function resetOverlayUI() {
  ['ov-lx','ov-ly','ov-rx','ov-ry','ov-swap'].forEach(id => $(id).checked = false);
  $('ov-socd').value = '0'; $('ov-ls').value = '0'; $('ov-rs').value = '0';
}

$('ov-apply').onclick = async () => {
  const body = {
    flags: overlayFlagsFromUI(),
    left_stick_sens:  +$('ov-ls').value,
    right_stick_sens: +$('ov-rs').value,
    socd_mode:        +$('ov-socd').value,
  };
  const r = await api('POST', '/overlay', body);
  if (r && r.ok) log(`overlay flags=${r.flags} L=${r.left_stick_sens} R=${r.right_stick_sens} socd=${r.socd_mode}`);
};

$('ov-clear').onclick = async () => {
  const r = await api('POST', '/overlay/clear');
  if (r && r.ok) log('overlay cleared');
  resetOverlayUI();
};

const OVERLAY_PRESETS = {
  'invert-lx':       { flags: 8 },
  'invert-rx':       { flags: 16 },
  'invert-both-x':   { flags: 24 },         // LX + RX
  'invert-all':      { flags: 30 },         // LX+LY+RX+RY
  'swap':            { flags: 1 },
  'full-chaos':      { flags: 1 | 30 },     // swap + invert all
};

let countdownTimer = null;

$('te-fire').onclick = async () => {
  if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }

  const effect = $('te-effect').value;
  const secs = +$('te-secs').value;
  let resetPath;

  if (effect.startsWith('select:')) {
    const idx = +effect.slice(7);
    await api('POST', `/profile/${idx}`);
    log(`timed: profile #${idx} for ${secs}s`);
    resetPath = '/neutral';
  } else if (effect.startsWith('overlay:')) {
    const cfg = OVERLAY_PRESETS[effect.slice(8)];
    await api('POST', '/overlay', cfg);
    log(`timed: overlay flags=${cfg.flags} for ${secs}s`);
    resetPath = '/overlay/clear';
  }
  refresh();

  let remaining = secs;
  $('te-countdown').textContent = `↻ ${remaining}s`;
  countdownTimer = setInterval(() => {
    remaining--;
    if (remaining <= 0) {
      clearInterval(countdownTimer); countdownTimer = null;
      $('te-countdown').textContent = '';
      api('POST', resetPath).then(() => { log(`timed → reset`); refresh(); resetOverlayUI(); });
    } else {
      $('te-countdown').textContent = `↻ ${remaining}s`;
    }
  }, 1000);
};

refresh();
setInterval(refresh, 4000);
</script>
</body>
</html>
